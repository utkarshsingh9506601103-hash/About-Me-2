<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Us</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#020b25,#061b4b,#0b2e75);
    overflow:hidden;
}

/* Glowing circles */
body::before{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:#00aeff;
    border-radius:50%;
    top:-100px;
    left:-100px;
    filter:blur(150px);
}

body::after{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:#0077ff;
    border-radius:50%;
    bottom:-100px;
    right:-100px;
    filter:blur(150px);
}

.container{
    width:90%;
    max-width:800px;
    padding:40px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(15px);
    border-radius:25px;
    box-shadow:
    0 0 20px rgba(0,140,255,0.5),
    0 0 50px rgba(0,140,255,0.3);
    text-align:center;
    color:white;
}

h1{
    font-size:3rem;
    margin-bottom:20px;
    text-shadow:0 0 15px #00aeff;
}

p{
    line-height:1.8;
    color:#d5e9ff;
    margin-bottom:30px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

button{
    padding:15px 30px;
    font-size:16px;
    color:white;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:15px;
    backdrop-filter:blur(10px);
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 0 15px rgba(0,170,255,0.5);
}

button:hover{
    background:rgba(255,255,255,0.2);
    transform:translateY(-5px);
    box-shadow:
    0 0 20px #00aeff,
    0 0 40px #00aeff;
}

.footer{
    margin-top:30px;
    color:#9ccfff;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">
    <h1>About me</h1>

    <p>
        Hi, I'm Utkarsh Singh, a passionate learner and aspiring web developer. I enjoy creating modern, user-friendly websites and exploring new technologies. I believe in continuous learning, creativity, and turning ideas into reality
    </p>

   <div class="buttons">
    <a href="Contact web page.html">
        <button>Contact me</button>
    </a>
    <a href="/my skills.html">
    <button>MY ACADEMIC SKILLS</button>
</a>
<a href="/PORTFOLIO.html">
<button>Portfolio</button>
</a>
</div>

    <div class="footer">
        © 2026 Your Company. All Rights Reserved.
    </div>
</div>

<div class="profile-container">
    <img
        src="https://cdn.discordapp.com/attachments/1507723030829334549/1519363956999852072/IMG_20260624_205925.jpg?ex=6a3d4973&is=6a3bf7f3&hm=7393d44b7e616be9017d01dc0098a1836058d32359321462df97ebfe113d6a23&"
        alt="Profile Picture"
        class="profile-image">
</div>

<style>
.profile-container{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:25px;
}

.profile-image{
    width:160px;
    height:160px;
    border-radius:50%;
    object-fit:cover;

    /* Glassmorphism border */
    border:4px solid rgba(255,255,255,0.3);

    /* Glowing effect */
    box-shadow:
        0 0 10px #00aeff,
        0 0 25px #00aeff,
        0 0 50px #008cff;

    transition:0.4s;
}

.profile-image:hover{
    transform:scale(1.05);
    box-shadow:
        0 0 20px #00aeff,
        0 0 40px #00aeff,
        0 0 80px #008cff;
}
</style>

</body>
</html>
